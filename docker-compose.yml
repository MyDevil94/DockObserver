services:
  dockobserver:
    image: ghcr.io/mydevil94/dockobserver:latest
    container_name: dockobserver
    restart: unless-stopped
    init: true
    stop_grace_period: 4s
    ports:
      - "8080:8080"
    environment:
      - DATA_DIR=/data
      - DOCKER_SOCKET=/var/run/docker.sock
      - LOCAL_REFRESH_HOURS=6
      - UPDATE_INTERVAL_MINUTES=30
      - UPDATE_BATCH_SIZE=5
      - DRY_RUN=false
      - APP_LOCALE=en
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - /opt/stacks/:/opt/stacks:ro
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
