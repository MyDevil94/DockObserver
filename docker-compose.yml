services:
  dockobserver:
    image: ghcr.io/mydevil94/dockobserver:latest
    container_name: dockobserver
    ports:
      - "8080:8080"
    environment:
      - DATA_DIR=/data
      - DOCKER_SOCKET=/var/run/docker.sock
      - COMPOSE_MOUNTS=/stacks
      - LOCAL_REFRESH_HOURS=6
      - UPDATE_INTERVAL_MINUTES=30
      - UPDATE_BATCH_SIZE=5
      - DRY_RUN=false
      - APP_LOCALE=de
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - /opt/stacks/:/stacks:ro
