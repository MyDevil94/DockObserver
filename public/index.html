<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DockObserver</title>
    <meta name="theme-color" content="#0b1116" />
    <meta name="msapplication-TileColor" content="#0b1116" />
    <meta name="msapplication-config" content="/assets/favicons/browserconfig.xml" />
    <link rel="icon" href="assets/favicons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicons/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="assets/favicons/favicon-256x256.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="assets/favicons/apple-icon-57x57.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="assets/favicons/apple-icon-60x60.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="assets/favicons/apple-icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="assets/favicons/apple-icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="assets/favicons/apple-icon-114x114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="assets/favicons/apple-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="assets/favicons/apple-icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="assets/favicons/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-icon-180x180.png" />
    <link rel="manifest" href="assets/favicons/manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="locale-switch">
          <select id="localeSelect" aria-label="Sprache"></select>
        </div>
        <div class="hero-copy">
          <img
            id="heroIcon"
            class="hero-icon"
            src="assets/branding/logo-icon.png"
            alt=""
            aria-hidden="true"
          />
          <p class="eyebrow">DockObserver</p>
        </div>
        <div class="actions">
          <button id="refreshBtn">Lokal neu einlesen</button>
          <button id="batchBtn" class="ghost">Batch Update-Check</button>
        </div>
      </header>

      <section class="meta">
        <div id="lastRefresh">Letzter lokaler Scan: –</div>
        <div id="lastAutomaticCheck">Letzter automatischer Check: –</div>
        <div id="count">0 Images</div>
      </section>

      <section id="groups" class="groups"></section>
    </main>

    <div id="confirmModal" class="modal hidden">
      <div id="modalBackdrop" class="modal-backdrop"></div>
      <div class="modal-card">
        <h2 id="modalTitle">Update bestätigen</h2>
        <p id="modalText" class="modal-text"></p>
        <div id="modalItems" class="modal-items"></div>
        <label id="modalPruneLabel" class="modal-prune">
          <input id="modalPrune" type="checkbox" />
          Image prune nach Update ausführen (`docker image prune -af`)
        </label>
        <div class="modal-actions">
          <button id="modalCancel" class="ghost">Abbrechen</button>
          <button id="modalConfirm">Update starten</button>
        </div>
      </div>
    </div>

    <div id="consoleModal" class="modal hidden">
      <div id="consoleBackdrop" class="modal-backdrop"></div>
      <div class="modal-card console-card">
        <div class="console-header">
          <h2 id="consoleTitle">Update Konsole</h2>
          <button id="consoleClose" class="ghost">Schließen</button>
        </div>
        <div id="consoleTabs" class="console-tabs"></div>
        <pre id="consoleOutput" class="console-output"></pre>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
